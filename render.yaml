# Configuração de deploy no Render.com
# Siga o README para fazer o deploy gratuito

services:
  - type: web
    name: album-copa-2026
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DB_PATH
        value: /opt/render/project/src/album.db
    disk:
      name: album-data
      mountPath: /opt/render/project/src
      sizeGB: 1
